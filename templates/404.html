<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | C-SHAW Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Poppins', sans-serif;
            color: #e2e8f0;
            text-align: center;
            overflow: hidden;
        }

        .error-container {
            padding: 40px;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            background: linear-gradient(to right, #FF8C42, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(255, 140, 66, 0.3);
            letter-spacing: -5px;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 800;
            margin: 10px 0 15px;
            color: #ffffff;
        }

        .error-message {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #FF8C42;
            color: #101524;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 140, 66, 0.2);
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 140, 66, 0.4);
            background: #ffa062;
        }

        /* A little floating animation for the icon */
        .fa-compass {
            animation: float 3s ease-in-out infinite;
            display: block;
            font-size: 3rem;
            color: #475569;
            margin-bottom: -20px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <i class="fa-regular fa-compass"></i>
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Looks like you're lost!</h2>
        <p class="error-message">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        
        <a href="{% url 'index' %}" class="home-btn">
            <i class="fa-solid fa-house"></i> Return to Hub
        </a>
    </div>

</body>
</html>
