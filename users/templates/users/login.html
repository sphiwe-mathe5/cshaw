{% extends 'users/base_auth.html' %}

{% block title %}Login - C-SHAW Hub{% endblock %}

{% block content %}
<div class="form-wrapper">
    
    <div id="loginStep">
        <div class="logo-container">
            <div class="logo-wrapper">
                <svg class="brand-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                    <path fill="currentColor" d="M311.6 95C297.5 75.5 274.9 64 250.9 64C209.5 64 176 97.5 176 138.9L176 141.3C176 205.7 258 274.7 298.2 304.6C311.2 314.3 328.7 314.3 341.7 304.6C381.9 274.6 463.9 205.7 463.9 141.3L463.9 138.9C463.9 97.5 430.4 64 389 64C365 64 342.4 75.5 328.3 95L320 106.7L311.6 95zM141.3 405.5L98.7 448L64 448C46.3 448 32 462.3 32 480L32 544C32 561.7 46.3 576 64 576L384.5 576C413.5 576 441.8 566.7 465.2 549.5L591.8 456.2C609.6 443.1 613.4 418.1 600.3 400.3C587.2 382.5 562.2 378.7 544.4 391.8L424.6 480L312 480C298.7 480 288 469.3 288 456C288 442.7 298.7 432 312 432L384 432C401.7 432 416 417.7 416 400C416 382.3 401.7 368 384 368L231.8 368C197.9 368 165.3 381.5 141.3 405.5z"/>
                </svg>
            </div>
        </div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to your C-SHAW account</p>

        <form id="loginForm" data-sitekey="{{ RECAPTCHA_SITE_KEY }}">
            <input type="hidden" id="g-recaptcha-response" name="g-recaptcha-response">
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <span class="field-icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </span>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper password-wrapper">
                    <span class="field-icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <div class="forgot-password-container">
                <a href="/password-reset/" class="forgot-password-link">Forgot Password?</a>
            </div>

            <div id="formError" class="error-message hidden"></div>

            <button type="submit" id="submitBtn">Login</button>
            <div id="loader" class="loader hidden"></div>
        </form>
    </div>

    <div id="otpStep" style="display: none; text-align: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#E35205" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 15px;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <h2>Two-Factor Auth</h2>
        <p class="subtitle" style="margin-bottom: 30px;">We've sent a 6-digit code to your email.</p>

        <form id="otpForm">
            <div class="form-group">
                <input type="text" id="otpCode" name="otp" placeholder="000000" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 8px; font-weight: bold;" required>
            </div>
            
            <div id="otpError" class="error-message hidden"></div>

            <button type="submit" id="otpSubmitBtn">Verify & Login</button>
            <div id="otpLoader" class="loader hidden"></div>
        </form>
        
        <p class="switch-link" style="margin-top: 20px;">
            Didn't receive it? <a href="javascript:location.reload();">Try logging in again</a>
        </p>
    </div>

</div>
{% endblock %}
